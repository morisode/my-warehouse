<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考研数学题库</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>考研数学题库</h1>
    <p>选择题练习 · 支持上传自定义题目</p>
  </header>

  <!-- Toolbar (Upload + Reset) -->
  <div class="toolbar">
    <button class="toolbar-btn upload-trigger" onclick="openUploadModal()">
      <span>&#128228;</span> 上传题目
    </button>
    <button class="toolbar-btn reset-trigger" onclick="resetQuiz()">
      <span>&#128260;</span> 重置答题
    </button>
    <span class="toolbar-info" id="toolbarInfo">共 0 道题</span>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">进度</div>
      <div class="stat-value" id="statProgress">0/0</div>
    </div>
    <div class="stat-item correct">
      <div class="stat-label">正确</div>
      <div class="stat-value" id="statCorrect">0</div>
    </div>
    <div class="stat-item wrong">
      <div class="stat-label">错误</div>
      <div class="stat-value" id="statWrong">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">正确率</div>
      <div class="stat-value" id="statRate">-</div>
    </div>
  </div>

  <!-- Category Filters -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="高等数学">高等数学</button>
    <button class="filter-btn" data-filter="线性代数">线性代数</button>
    <button class="filter-btn" data-filter="概率论与数理统计">概率统计</button>
  </div>

  <!-- Quiz Card -->
  <div class="quiz-card" id="quizCard">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="question-area" id="questionArea">
      <div class="question-meta" id="questionMeta"></div>
      <div class="question-number" id="questionNumber"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="explanation-box" id="explanationBox">
        <div class="explanation-title">解析</div>
        <div class="explanation-text" id="explanationText"></div>
      </div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()">
        <span>&#8592;</span> 上一题
      </button>
      <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">
        下一题 <span>&#8594;</span>
      </button>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">&#128218;</div>
    <h3>题库为空</h3>
    <p>点击上方「上传题目」按钮，加载 JSON 格式的题目文件开始练习</p>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2>上传题目</h2>
        <button class="modal-close" onclick="closeUploadModal()">&times;</button>
      </div>

      <div class="modal-body">
        <!-- Upload mode -->
        <div class="upload-mode">
          <label class="radio-label">
            <input type="radio" name="uploadMode" value="replace" checked>
            <span>替换题库</span>
            <small>清除现有题目，使用上传的题目</small>
          </label>
          <label class="radio-label">
            <input type="radio" name="uploadMode" value="append">
            <span>追加题目</span>
            <small>在现有题目基础上添加新题目</small>
          </label>
        </div>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
          <div class="drop-zone-icon">&#128194;</div>
          <div class="drop-zone-text">拖拽 JSON 文件到此处</div>
          <div class="drop-zone-hint">或点击下方按钮选择文件</div>
          <label class="upload-btn" for="fileInput">
            选择文件
          </label>
          <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileSelect(event)">
        </div>

        <div class="file-info" id="fileInfo" style="display:none">
          <span class="file-info-icon">&#128196;</span>
          <span class="file-info-name" id="fileName"></span>
          <button class="file-info-remove" onclick="clearFile()">&times;</button>
        </div>

        <!-- Template download -->
        <div class="template-section">
          <p>不知道格式？<a href="javascript:void(0)" onclick="downloadTemplate()">下载题目模板</a></p>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-btn cancel" onclick="closeUploadModal()">取消</button>
        <button class="modal-btn confirm" id="confirmUploadBtn" onclick="confirmUpload()" disabled>确认上传</button>
      </div>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-icon" id="resultIcon"></div>
      <h2 id="resultTitle">练习完成</h2>
      <div class="result-score" id="resultScore"></div>
      <div class="result-detail" id="resultDetail"></div>
      <button class="restart-btn" onclick="restartQuiz()">重新开始</button>
    </div>
  </div>

  <footer class="app-footer">
    考研数学题库 &copy; 2026 &middot; 支持自定义题目上传
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="script.js"></script>
</body>
</html>
